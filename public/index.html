<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrivyMessages — Sign In</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">privy<span>messages</span></div>
        <div class="login-sub">end-to-end encrypted messaging</div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login form -->
      <form class="login-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div class="error-msg" id="loginError"></div>
        <div class="field">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="your_username" autocomplete="username" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
      </form>

      <!-- Register form -->
      <form class="login-form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="error-msg" id="registerError"></div>
        <div class="field">
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="choose_a_username" minlength="3" maxlength="30" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="min 6 characters" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('pm_token');
    const user = JSON.parse(localStorage.getItem('pm_user') || 'null');
    if (token && user) {
      window.location.href = user.isAdmin ? '/admin.html' : '/app.html';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
      document.getElementById('loginForm').classList.toggle('active', tab === 'login');
      document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('loginUsername').value,
            password: document.getElementById('loginPassword').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('pm_token', data.token);
        localStorage.setItem('pm_user', JSON.stringify(data.user));
        window.location.href = data.user.isAdmin ? '/admin.html' : '/app.html';
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const err = document.getElementById('registerError');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('regUsername').value,
            password: document.getElementById('regPassword').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        localStorage.setItem('pm_token', data.token);
        localStorage.setItem('pm_user', JSON.stringify(data.user));
        window.location.href = '/app.html';
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
